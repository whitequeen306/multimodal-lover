server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: multimodal-lover
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/multimodal_lover?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: vlover-token
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: simple-uuid

lover:
  ai:
    context-window: ${LOVER_AI_CONTEXT_WINDOW:20}
    max-replies-per-turn: ${LOVER_MAX_REPLIES_PER_TURN:3}
    vision:
      enabled: true
      model: ${LOVER_VISION_MODEL:qwen3-vl-flash}
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    chat:
      model: ${LOVER_CHAT_MODEL:deepseek-v4-flash}
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:multimodal-lover}
  public-base-url: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true

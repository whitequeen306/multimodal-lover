spring:
  datasource:
    url: jdbc:h2:mem:multimodal_lover;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  data:
    redis:
      host: 127.0.0.1

sa-token:
  token-name: vlover-token
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid

lover:
  ai:
    context-window: 10
    max-replies-per-turn: 2
    vision:
      enabled: true
      api-key: test-key
    chat:
      api-key: test-key

minio:
  endpoint: http://localhost:9000
  access-key: test
  secret-key: test
  bucket: multimodal-lover
  public-base-url: http://localhost:9000

logging:
  level:
    root: WARN
    com.virtuallover: INFO

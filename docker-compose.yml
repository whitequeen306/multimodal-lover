services:
  x-mysql:
    image: mysql:8.4
    container_name: X-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: multimodal_lover
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  x-redis:
    image: redis:7-alpine
    container_name: X-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        exec redis-server --requirepass \"$$REDIS_PASSWORD\";
      else
        exec redis-server;
      fi"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  x-minio:
    image: minio/minio:latest
    container_name: X-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  x-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: X-backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: x-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      REDIS_HOST: x-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      LOVER_VISION_MODEL: ${LOVER_VISION_MODEL:-qwen3-vl-flash}
      LOVER_CHAT_MODEL: ${LOVER_CHAT_MODEL:-deepseek-v4-flash}
      MINIO_ENDPOINT: http://x-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-multimodal-lover}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    depends_on:
      x-mysql:
        condition: service_healthy
      x-redis:
        condition: service_healthy
      x-minio:
        condition: service_healthy

  x-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: X-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      x-backend:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  minio_data:

services:
  x-mysql:
    image: mysql:8.4
    container_name: X-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: multimodal_lover
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  x-redis:
    image: redis:7-alpine
    container_name: X-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  x-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: X-backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: x-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      REDIS_HOST: x-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      LOVER_VISION_MODEL: ${LOVER_VISION_MODEL:-qwen3-vl-plus}
      LOVER_CHAT_MODEL: ${LOVER_CHAT_MODEL:-qwen3.6-plus}
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY}
      QINIU_BUCKET: ${QINIU_BUCKET}
      QINIU_DOMAIN: ${QINIU_DOMAIN}
    depends_on:
      x-mysql:
        condition: service_healthy
      x-redis:
        condition: service_healthy

  x-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: X-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - x-backend

volumes:
  mysql_data:
  redis_data:
